<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter System | Secure Portal</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --hover-blue: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-dark: #1e293b;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .container {
            background: var(--white);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 
                        0 20px 48px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .icon-header {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        p {
            color: #64748b;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--hover-blue);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid #e2e8f0;
            color: #475569;
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            color: var(--text-dark);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-header">🗳️</div>
        <h1>Secure Voter Portal</h1>
        <p>Please use the options below to verify your identity and cast your vote securely.</p>

        <div class="action-buttons">
            <a href="{% url 'scan' %}" class="btn btn-primary">
                📷 Scan QR Code to Start
            </a>
            
            <a href="/admin/" class="btn btn-outline">
                👨‍💼 Administrator Login
            </a>
        </div>

        <div class="footer-note">
            Your vote is encrypted and anonymous.
        </div>
    </div>

</body>
</html>
