<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Secure Login</title>
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-blue: #3b82f6;
            --bg-slate: #f1f5f9;
            --error-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--primary-dark);
        }

        .login-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0.5rem;
        }

        .alert-box {
            background-color: #fef2f2;
            border-left: 4px solid var(--error-red);
            padding: 12px;
            margin-bottom: 1.5rem;
            border-radius: 4px;
        }

        .alert-box p {
            margin: 0;
            color: #991b1b;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #475569;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-dark);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #1e293b;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h2>Admin Login</h2>
            <p>Authorized Personnel Only</p>
        </div>

        {% if messages %}
            <div class="alert-box">
                {% for message in messages %}
                    <p>⚠️ {{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Secure Sign In</button>
        </form>

        <div class="footer">
            <p>Internal Voting Management System v2.0</p>
            <p><a href="/">Return to Voter Portal</a></p>
        </div>
    </div>

</body>
</html>
