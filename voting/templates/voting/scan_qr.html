<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Scan | Voter System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .scan-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Styling the QR Library Container */
        #reader {
            border: none !important;
            border-radius: 16px;
            overflow: hidden;
            background: #f8fafc;
        }

        /* Customizing library buttons to look professional */
        #reader button {
            background-color: var(--primary-color) !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: opacity 0.2s;
            margin: 10px 0 !important;
        }

        #reader button:hover {
            opacity: 0.9;
        }

        /* Hide the library's default anchor text */
        #reader a {
            display: none !important;
        }

        .status-footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #22c55e;
        }
    </style>
</head>
<body>

    <div class="scan-container">
        <div class="header">
            <h2>📷 Authenticate Voter</h2>
            <p>Please point your camera at the QR code on your voter card.</p>
        </div>

        <div id="reader"></div>

        <div class="status-footer">
            <span class="dot"></span> 
            Secure Connection Active
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText) {
            // Provide immediate haptic/visual feedback
            document.querySelector('.scan-container').style.opacity = '0.5';
            console.log("Scan successful:", decodedText);
            
            // Redirect to the encoded URL
            window.location.href = decodedText;
        }

        // Professional configuration
        const config = { 
            fps: 20,           // Higher FPS for smoother scanning
            qrbox: { width: 250, height: 250 }, // Focused scan area
            aspectRatio: 1.0   // Square view
        };

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", config);
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
