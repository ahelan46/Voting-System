<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Secure Voting</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --error-red: #dc2626;
            --success-green: #16a34a;
            --bg-slate: #f1f5f9;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-slate);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .otp-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .shield-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.instruction {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .error-message {
            background-color: #fef2f2;
            color: var(--error-red);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border: 1px solid #fee2e2;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 1.25rem;
            letter-spacing: 0.5rem; /* Spaced out for better readability */
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .resend-link {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .resend-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="otp-card">
        <div class="shield-icon">🛡️</div>
        <h2>Verification Code</h2>
        <p class="instruction">We have sent a secure code to your mobile device. Please enter it below.</p>

        {% if error %}
        <div class="error-message">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" 
                       name="otp" 
                       placeholder="000000" 
                       maxlength="6" 
                       pattern="\d{6}" 
                       inputmode="numeric" 
                       autocomplete="one-time-code" 
                       required>
            </div>
            <button type="submit">Verify & Proceed</button>
        </form>

        <div class="resend-link">
            Didn't receive the code? <a href="#">Resend OTP</a>
        </div>
    </div>

</body>
</html>
